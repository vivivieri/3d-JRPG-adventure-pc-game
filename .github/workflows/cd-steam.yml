name: CD — Steam depot upload

# Manual Steam upload — requires Steamworks setup (App ID, depot VDF, secrets).
# Do not enable until docs/STEAM_RELEASE_CHECKLIST.md §3 is complete.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel (gates + upload target)'
        required: true
        default: beta
        type: choice
        options:
          - beta
          - prod
      tag:
        description: 'Git tag to build (e.g. v1.0.0-beta1). Leave empty for current SHA.'
        required: false
        type: string

concurrency:
  group: cd-steam-${{ github.event.inputs.channel }}
  cancel-in-progress: false

jobs:
  steam-upload:
    name: Build + steamcmd upload
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: steam-${{ github.event.inputs.channel }}

    steps:
      - name: Checkout tag or SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag != '' && github.event.inputs.tag || github.sha }}

      - name: Guard — game project + secrets
        env:
          STEAM_APP_ID: ${{ secrets.STEAM_APP_ID }}
          STEAM_DEPOT_ID: ${{ secrets.STEAM_DEPOT_ID }}
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
        run: |
          if [[ ! -f game/project.godot ]]; then
            echo "::error::Checkout game/development tag — game/project.godot missing"
            exit 1
          fi
          for var in STEAM_APP_ID STEAM_DEPOT_ID STEAM_USERNAME; do
            if [[ -z "${!var}" ]]; then
              echo "::error::Missing secret $var — see docs/CD.md §5"
              exit 1
            fi
          done
          if [[ ! -f steam/depot/app_build.vdf ]]; then
            echo "::error::Missing steam/depot/app_build.vdf — create from steam/depot/README.md"
            exit 1
          fi

      - name: Install dependencies
        run: |
          bash tools/install_ci_deps.sh
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq steamcmd

      - name: Run CD gates
        run: bash tools/run_cd_gates.sh --channel "${{ github.event.inputs.channel }}"

      - name: Install GodotSteam and export
        run: |
          GODOTSTEAM_VERSION=4.20 bash tools/install_godotsteam.sh
          bash tools/export_windows.sh
          bash tools/prepare_steam_depot.sh

      - name: Stage content for depot
        run: |
          CONTENT="build/steam_content"
          rm -rf "$CONTENT"
          mkdir -p "$CONTENT"
          cp -a build/steam_depot/* "$CONTENT/"
          rm -f "$CONTENT/steam_appid.txt"
          echo "Staged:"
          ls -la "$CONTENT"

      - name: Upload via steamcmd
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          STEAM_APP_ID: ${{ secrets.STEAM_APP_ID }}
        run: |
          echo "::warning::Steam upload requires valid depot VDF at steam/depot/app_build.vdf"
          steamcmd +login "$STEAM_USERNAME" "$STEAM_PASSWORD" \
            +run_app_build "$(pwd)/steam/depot/app_build.vdf" \
            +quit

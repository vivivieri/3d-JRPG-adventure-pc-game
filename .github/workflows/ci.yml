name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  l0-l2-headless:
    name: L0–L2 headless gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CI dependencies
        run: bash tools/install_ci_deps.sh

      - name: Run CI checks
        run: bash tools/run_ci_checks.sh

      - name: Upload CI summary on failure
        if: failure()
        run: |
          echo "::error::CI failed — see docs/CI.md for gate definitions and remediation"
          echo "Run locally: bash tools/install_ci_deps.sh && bash tools/run_ci_checks.sh"

name: Game CI

on:
  push:
    branches: [game/development]
  pull_request:
    branches: [game/development]

concurrency:
  group: game-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  l0-l2-headless:
    name: L0–L2 headless gates
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install CI dependencies
        run: bash tools/install_ci_deps.sh

      - name: Run full game CI checks
        run: bash tools/run_ci_checks.sh

      - name: Upload CI summary on failure
        if: failure()
        run: |
          echo "::error::Game CI failed — see docs/ci-cd/CI.md"
          echo "Run locally: bash tools/install_ci_deps.sh && bash tools/run_ci_checks.sh"

  windows-export-run:
    name: L2 Windows export + run
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Godot (Windows)
        shell: bash
        run: bash tools/install_ci_deps_windows.sh

      - name: Windows export + run smoke
        shell: bash
        run: |
          set +e
          bash tools/run_windows_export_run.sh
          rc=$?
          set -e
          if [[ "$rc" -eq 2 ]]; then
            echo "[SKIP] Windows export/run — no game/project.godot yet"
            exit 0
          fi
          exit "$rc"

      - name: Upload CI summary on failure
        if: failure()
        shell: bash
        run: |
          echo "::error::Windows export/run smoke failed — see docs/qa/PLATFORM_SUPPORT.md"
          echo "Run locally on Windows: bash tools/install_ci_deps_windows.sh && bash tools/run_windows_export_run.sh"

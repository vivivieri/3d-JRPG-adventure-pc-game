name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-and-data:
    name: Docs + design data gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python validators
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq python3 python3-pip ripgrep shellcheck
          pip3 install --user -q -r tools/requirements-ci.txt

      - name: Run main-branch CI checks
        run: bash tools/run_docs_ci_checks.sh

      - name: Upload CI summary on failure
        if: failure()
        run: |
          echo "::error::Main CI failed — see docs/workflow/BRANCHING.md and docs/ci-cd/CI.md"
          echo "Run locally: bash tools/run_docs_ci_checks.sh"

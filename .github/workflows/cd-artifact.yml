name: CD — Release artifact

on:
  push:
    tags:
      - 'v*-rc*'
      - 'v*-uat*'
      - 'v*-beta*'
      - 'v*.*.*'

concurrency:
  group: cd-artifact-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Export Linux + Windows + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: ${{ (contains(github.ref_name, '-rc') || contains(github.ref_name, '-uat')) && 'uat' || (contains(github.ref_name, '-beta') && 'steam-beta' || 'steam-production') }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Guard — game project required
        run: |
          if [[ ! -f game/project.godot ]]; then
            echo "::error::CD requires a tag on game/development (game/project.godot missing)."
            echo "Tag from: git checkout game/development && git tag v0.1.0-rc1 && git push origin v0.1.0-rc1"
            exit 1
          fi

      - name: Resolve CD channel from tag
        id: channel
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *-rc* ]] || [[ "$TAG" == *-uat* ]]; then
            CHANNEL=rc
          elif [[ "$TAG" == *-beta* ]]; then
            CHANNEL=beta
          else
            CHANNEL=prod
          fi
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "Resolved channel=${CHANNEL} for tag=${TAG}"

      - name: Install CI dependencies
        run: bash tools/install_ci_deps.sh

      - name: Run CD gates
        run: bash tools/run_cd_gates.sh --channel "${{ steps.channel.outputs.channel }}"

      - name: Install GodotSteam
        run: GODOTSTEAM_VERSION=4.20 bash tools/install_godotsteam.sh

      - name: Export Linux build
        run: bash tools/export_linux.sh

      - name: Export Windows build
        run: bash tools/export_windows.sh

      - name: Prepare Steam depot layout (Linux + Windows)
        run: bash tools/prepare_steam_depot.sh --platform all

      - name: Package depot zips
        run: |
          cd build
          zip -r "TidesOfUrashima-steam-depot-windows-${GITHUB_REF_NAME}.zip" steam_depot_windows
          zip -r "TidesOfUrashima-steam-depot-linux-${GITHUB_REF_NAME}.zip" steam_depot_linux
          ls -lh ./*.zip ./*.exe ./*.x86_64 2>/dev/null || ls -lh
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Tides of Urashima ${{ github.ref_name }}
          body: |
            Automated CD artifact from commit ${{ github.sha }}.

            **Channel:** ${{ steps.channel.outputs.channel }}
            **Platforms (v1):** Linux + Windows — see `docs/qa/PLATFORM_SUPPORT.md`

            **Contents:**
            - `TidesOfUrashima.x86_64` (Linux)
            - `TidesOfUrashima.exe` (Windows)
            - Steam depot zips for both platforms

            ### Verify locally
            - **Linux:** extract linux zip → run `steam_depot_linux/TidesOfUrashima.x86_64`
            - **Windows:** extract windows zip → run `steam_depot_windows/TidesOfUrashima.exe` with Steam client

            See `docs/ci-cd/CD.md` and `docs/ci-cd/STEAM_RELEASE_CHECKLIST.md`.
          files: |
            build/TidesOfUrashima-steam-depot-windows-${{ github.ref_name }}.zip
            build/TidesOfUrashima-steam-depot-linux-${{ github.ref_name }}.zip
            build/TidesOfUrashima.exe
            build/TidesOfUrashima.x86_64
          draft: ${{ steps.channel.outputs.channel != 'prod' }}
          prerelease: ${{ steps.channel.outputs.channel != 'prod' }}
